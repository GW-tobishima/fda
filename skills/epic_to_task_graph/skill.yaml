skill:
  name: epic_to_task_graph
  version: v0.1.0
  purpose: Epic Delivery Plan と Case Graph から ATO Task Graph を生成する。
  input_schema:
    - docs/standards/delivery-artifacts-v0/schemas/epic_delivery_plan.schema.json
    - docs/standards/delivery-artifacts-v0/schemas/case_graph.schema.json
    - docs/standards/fda-v1/schemas/repository-profile/repo_yaml.schema.json
    - docs/standards/fda-v1/schemas/repository-profile/delivery_policy_yaml.schema.json
  output_schema:
    - docs/standards/delivery-artifacts-v0/schemas/task_graph.schema.json
    - docs/standards/delivery-artifacts-v0/schemas/artifact_inventory.schema.json
  allowed_actions:
    - task_graph_draft
    - dependency_mapping
    - ai_repair_marker_create
    - artifact_inventory_update
  forbidden_actions:
    - source_mutation
    - github_pr_create
    - ato_execute
    - human_decision_approval
  required_artifacts:
    - task_graph.json
    - artifact_inventory.json
    - runner_explanation.json
  validation_commands:
    - test -f artifacts/runs/<run_id>/task_graph.json
    - test -f artifacts/runs/<run_id>/artifact_inventory.json
    - test -f artifacts/runs/<run_id>/runner_explanation.json
    - cargo run -- validate-artifacts --artifacts artifacts/runs/<run_id> --out artifacts/runs/<run_id>/validation_report.json
  escalation_conditions:
    - missing_case_owner
    - impossible_task_dependency
    - policy_requires_human_decision
