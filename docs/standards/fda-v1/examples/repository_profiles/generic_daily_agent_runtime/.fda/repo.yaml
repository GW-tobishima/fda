repo:
  id: generic-daily-agent-runtime
  name: generic_daily_agent_runtime
  default_branch: main
  stack:
    language: python
    framework: cli
    package_manager: pip
  risk_profile:
    privacy_sensitive: false
    legal_sensitive: false
    user_generated_content: false
