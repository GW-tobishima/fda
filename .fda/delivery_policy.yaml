delivery_policy:
  default_autonomy_level: pr_open_allowed
  auto_merge_allowed: false
  human_required_for:
    - scope_change
    - privacy_policy_change
    - terms_change
    - legal_judgment
    - security_boundary_change
    - security_high_or_critical
    - user_data_exposure
    - public_api_breaking_change
    - risk_approval
    - merge_approval
    - release_approval
    - precedent_conflict
  # NOTE: .fda/** は意図的に low_risk_paths へ入れない。統治ファイル
  # (delivery_policy.yaml / gates.yaml 等) を low 扱いすると、まさに .fda 変更を
  # 見るための forge_reviewer をスキップできてしまう (defense in depth。
  # コード側の governance hard guard でも同経路は遮断済みで YAML では上書き不可)。
  low_risk_paths:
    - docs/**
    - tests/**
    - artifacts/runs/**
  forbidden_without_human:
    - database_destructive_migration
    - raw_user_log_exposure
    - third_party_data_export
    - merge_approval
    - release_approval
